name: f0x-mcp-security

on:
  push:
    paths:
      - "F0X/mcp-server/**"
      - ".github/workflows/f0x-mcp-security.yml"
  pull_request:
    paths:
      - "F0X/mcp-server/**"
      - ".github/workflows/f0x-mcp-security.yml"

jobs:
  security-static:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: F0X/mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: F0X/mcp-server/package-lock.json
      - run: npm ci
      - run: npm run security:check

  security-live:
    runs-on: ubuntu-latest
    needs: security-static
    if: ${{ secrets.SECURITY_TEST_AGENT_A_TOKEN != '' && secrets.SECURITY_TEST_AGENT_B_TOKEN != '' && secrets.SECURITY_TEST_AGENT_A_CHANNEL_ID != '' && secrets.SECURITY_TEST_AGENT_B_CHANNEL_ID != '' && secrets.RELAY_URL != '' }}
    defaults:
      run:
        working-directory: F0X/mcp-server
    env:
      RELAY_URL: ${{ secrets.RELAY_URL }}
      SECURITY_TEST_AGENT_A_TOKEN: ${{ secrets.SECURITY_TEST_AGENT_A_TOKEN }}
      SECURITY_TEST_AGENT_B_TOKEN: ${{ secrets.SECURITY_TEST_AGENT_B_TOKEN }}
      SECURITY_TEST_AGENT_A_CHANNEL_ID: ${{ secrets.SECURITY_TEST_AGENT_A_CHANNEL_ID }}
      SECURITY_TEST_AGENT_B_CHANNEL_ID: ${{ secrets.SECURITY_TEST_AGENT_B_CHANNEL_ID }}
      SECURITY_TEST_VERIFY_LOGOUT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: F0X/mcp-server/package-lock.json
      - run: npm ci
      - run: npm run security:live
