name: Procurement Agent (Contract 2)

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    env:
      AGI_ALPHA_MCP:      ${{ secrets.AGI_ALPHA_MCP }}
      ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL:    ${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      ETH_RPC_URL:        ${{ secrets.ETH_RPC_URL }}
      AGENT_PRIVATE_KEY:  ${{ secrets.WALLET_PRIVATE_KEY }}
      AGENT_SUBDOMAIN:    ${{ secrets.ENS_SUBDOMAIN }}
      AGENT_MERKLE_PROOF: ${{ secrets.AGENT_MERKLE_PROOF || '[]' }}
      PINATA_JWT:         ${{ secrets.PINATA_JWT }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: AgiPrimeDiscovery

      - name: Run procurement poll
        run: node run_procurement_once.js
        working-directory: AgiPrimeDiscovery

      - name: Commit state
        run: |
          git config user.name "emperor-agent"
          git config user.email "agent@emperoros"
          git add AgiPrimeDiscovery/data/procurement_state.json
          git diff --cached --quiet || git commit -m "chore: update procurement state [skip ci]"
          git push origin main || true
